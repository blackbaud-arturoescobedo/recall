<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recall OBS Overlay</title>
  <style>
    :root {
      --bg: rgba(38, 16, 3, 0.8);
      --stroke: rgba(251, 146, 60, 0.55);
      --text: #ffedd5;
      --muted: #fdba74;
      --accent: #fb923c;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI", "Calibri", sans-serif;
    }

    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .lower-third {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: inline-flex;
      align-items: center;
      gap: 30px;
      padding: 34px 44px;
      border: 2px solid var(--stroke);
      border-radius: 24px;
      background: var(--bg);
      color: var(--text);
      backdrop-filter: blur(8px);
      box-shadow: 0 22px 44px rgba(2, 8, 23, 0.55);
    }

    .dot {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 12px rgba(251, 146, 60, 0.3);
      flex: 0 0 auto;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .project {
      font-size: 26px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      text-shadow: 0 1px 0 rgba(2, 6, 23, 0.45);
    }

    .product {
      margin-top: 2px;
      font-size: 88px;
      font-weight: 800;
      letter-spacing: 0.01em;
      color: #fb923c;
      text-shadow: 0 2px 0 rgba(2, 6, 23, 0.5);
    }

    .author {
      margin-top: 6px;
      font-size: 22px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      text-shadow: 0 1px 0 rgba(2, 6, 23, 0.45);
    }

    .badge {
      margin-left: 6px;
      padding: 12px 20px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      font-size: 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
      background: rgba(60, 28, 8, 0.45);
    }
  </style>
</head>
<body>
  <div class="canvas" aria-hidden="true">
    <div class="lower-third">
      <span class="dot"></span>
      <div class="title-block">
        <span class="project">Off the Grid Project</span>
        <span class="product">Recall</span>
        <span class="author">by Arturo Escobedo</span>
      </div>
      <span class="badge">VS Code Demo</span>
    </div>
  </div>
</body>
</html>
